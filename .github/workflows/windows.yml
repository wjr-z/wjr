# This is a basic workflow to help you get started with Actions

name: Windows

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main", "light_test" ]
  pull_request:
    branches: [ "main", "light_test" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  tests:
    # The type of runner that the job will run on
    runs-on: windows-latest
    name: ${{ matrix.sys.compiler }} ${{ matrix.sys.version }}
    strategy:
      fail-fast: false
      matrix:
        sys:
        - {compiler: clang}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Setup MSVC
        if: matrix.sys.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup clang
        if: matrix.sys.compiler == 'clang'
        run: |
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Init submodule
        run: git submodule update --init --recursive

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

    #   - name: Install GMP

      - name: Configure using CMake
        shell: bash
        run: |
          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DWJR_BUILD_TESTS=ON \
            -DWJR_DEBUG_LEVEL_RELEASE=3 -DWJR_PUBLIC_FLAGS=ON -DWJR_USE_GMP=OFF

      - name: Build
        run: cmake --build build --target tests --config Release --parallel

      - name: Dump assembly for tests executable
        shell: bash
        run: |
          objdump -d ./build/bin/tests.exe > tests_disassembly.txt
          echo "Tests executable disassembly saved to tests_disassembly.txt"

      - name: Dump assembly for vector.cpp object file
        shell: bash
        run: |
          if [ -f ./build/test/CMakeFiles/tests.dir/container/vector.cpp.obj ]; then
            objdump -d ./build/test/CMakeFiles/tests.dir/container/vector.cpp.obj > vector_cpp_disassembly.txt
            echo "vector.cpp.obj disassembly saved to vector_cpp_disassembly.txt"
          else
            echo "Warning: vector.cpp.obj not found"
            find ./build -name "vector.cpp.obj" -o -name "vector.cpp.o"
          fi

      - name: Upload assembly artifacts
        uses: actions/upload-artifact@v3
        with:
          name: assembly-dumps-${{ matrix.sys.compiler }}
          path: |
            tests_disassembly.txt
            vector_cpp_disassembly.txt
          retention-days: 7

      - name: Run tests
        run: ./build/bin/tests